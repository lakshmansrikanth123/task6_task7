apiVersion: apps/v1
kind: Deployment
metadata:
  name: srikanth_k8s_dep
spec:
  replicas: 2
  selector:
    matchLabels:
      app: srik
  template:
    metadata:
      labels:
        app: srik
    spec:
      containers:
      - name: tes-container
        image: varsha0411/srikimg:v1   
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: tes-service
spec:
  type: LoadBalancer
  selector:
    app: srik
  ports:
    - protocol: TCP
      port: 80       
      targetPort: 8080  
